<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Agendamento</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0e0c0b;color:#f0ebe4;font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-text-size-adjust:100%}
#loading{position:fixed;inset:0;background:#0e0c0b;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:1rem}
.spin{width:36px;height:36px;border-radius:50%;border:2px solid rgba(201,169,110,.2);border-top-color:#c9a96e;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-name{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:#c9a96e;letter-spacing:.15em;opacity:.7}
#error-screen{display:none;position:fixed;inset:0;background:#0a0a0a;align-items:center;justify-content:center;flex-direction:column;gap:1rem;padding:2rem;text-align:center}
#error-screen h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:#c9a96e}
#error-screen p{font-size:13px;color:#666;line-height:1.6;max-width:320px}
#app{display:none}
</style>
</head>
<body>
<div id="loading"><div class="spin"></div><div class="loading-name" id="loading-name">Carregando...</div></div>
<div id="error-screen"><div style="font-size:3rem">😕</div><h2>Link inválido</h2><p>Este link de agendamento não está disponível. Solicite um novo link ao estabelecimento.</p></div>
<div id="app"></div>
<script>
function showError(){document.getElementById('loading').style.display='none';document.getElementById('error-screen').style.display='flex';}
function hexToRgb(h){var n=parseInt(h.replace('#',''),16);return((n>>16)&255)+','+(((n>>8)&255))+','+(n&255)}
function addBr(h,a){var n=parseInt(h.replace('#',''),16);return'#'+((1<<24)|(Math.min(255,((n>>16)&255)+a)<<16)|(Math.min(255,((n>>8)&255)+a)<<8)|Math.min(255,(n&255)+a)).toString(16).slice(1)}
function lighten(h,a){var n=parseInt(h.replace('#',''),16);return'#'+((1<<24)|(Math.min(255,(n>>16)+a)<<16)|(Math.min(255,((n>>8)&0xff)+a)<<8)|Math.min(255,(n&0xff)+a)).toString(16).slice(1)}

window.addEventListener('DOMContentLoaded',function(){
  var raw='';
  try{
    var hash=location.hash.replace(/^#/,'');
    if(hash.indexOf('d=')===0){raw=decodeURIComponent(hash.slice(2));}
    else{var p=new URLSearchParams(location.search);raw=p.get('d')||'';}
    if(!raw)throw new Error('no data');
    raw=decodeURIComponent(escape(atob(raw)));
  }catch(e){showError();return;}
  var data;try{data=JSON.parse(raw);}catch(e){showError();return;}
  var cfg=data.cfg||{},services=data.services||[],profs=data.profs||[];
  var cardStyle=data.cardStyle||'classic',gridCols=data.gridCols||2,iconSize=data.iconSize||'md',cardRadius=data.cardRadius!==undefined?data.cardRadius:14;
  var slots=data.slots||['08:00','09:00','10:00','11:00','13:00','14:00','15:00','16:00'];
  var blocked=data.blocked||[0];
  cfg.accent=cfg.accent||'#c9a96e';cfg.accent2=cfg.accent2||lighten(cfg.accent,30);cfg.bg=cfg.bg||'#0e0c0b';
  document.title=cfg.bizname||'Agendamento';
  document.getElementById('loading-name').textContent=cfg.bizname||'Carregando...';
  document.getElementById('app').innerHTML=buildApp(cfg,services,profs,cardStyle,gridCols,iconSize,cardRadius,slots,blocked);
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
  if(typeof window.renderCal==='function')window.renderCal();
});

function buildCardCSS(s,aRgb,bg,r){
  var R=r+'px',b='.service-card{border-radius:'+R+';cursor:pointer;transition:all .3s;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent;}.service-card:active{transform:scale(.97);}';
  var m={
    classic:'.service-card{background:var(--sf);border:1px solid var(--bo);padding:1rem;}.service-card:active{border-color:var(--bo2);}.service-card.selected{border-color:var(--go);background:rgba('+aRgb+',.08);}',
    glow:'.service-card{background:var(--sf);border:1px solid var(--bo);padding:1rem;}.service-card.selected{border-color:var(--go);box-shadow:0 0 20px rgba('+aRgb+',.3);background:rgba('+aRgb+',.07);}',
    pill:'.service-card{background:var(--sf);border:1px solid var(--bo);padding:1rem;}.service-card.selected{border-color:var(--go);background:rgba('+aRgb+',.07);}.svc-pill{display:inline-flex;align-items:center;gap:6px;background:rgba('+aRgb+',.12);border:1px solid rgba('+aRgb+',.25);border-radius:20px;padding:3px 10px 3px 6px;margin-bottom:.5rem;}',
    solid:'.service-card{background:rgba('+aRgb+',.08);border:1px solid rgba('+aRgb+',.2);padding:1rem;}.service-card.selected{background:rgba('+aRgb+',.2);border-color:var(--go);}',
    leftbar:'.service-card{background:var(--sf);border:1px solid var(--bo);border-left:3px solid var(--go);padding:1rem;}.service-card.selected{background:rgba('+aRgb+',.07);}',
    circle:'.service-card{background:var(--sf);border:1px solid var(--bo);padding:1rem;text-align:center;}.service-card.selected{border-color:var(--go);background:rgba('+aRgb+',.07);}.svc-circle{width:46px;height:46px;border-radius:50%;background:rgba('+aRgb+',.12);border:1px solid rgba('+aRgb+',.3);display:flex;align-items:center;justify-content:center;margin:0 auto .7rem;}',
    horizontal:'.service-card{background:var(--sf);border:1px solid var(--bo);padding:.85rem 1rem;display:flex!important;flex-direction:row!important;align-items:center;gap:10px;}.service-card.selected{border-color:var(--go);background:rgba('+aRgb+',.07);}.stc{flex:1;min-width:0;}',
    glass:'.service-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);padding:1rem;backdrop-filter:blur(10px);}.service-card.selected{border-color:var(--go);background:rgba('+aRgb+',.1);}',
    topbar:'.service-card{background:var(--sf);border:1px solid var(--bo);padding:0;overflow:hidden;}.service-card::before{content:"";display:block;height:4px;background:var(--go);transition:.2s;}.service-card.selected{border-color:var(--go);}.card-inner{padding:1rem;}',
    pricetag:'.service-card{background:var(--sf);border:1px solid var(--bo);padding:1rem;}.service-card.selected{border-color:var(--go);background:rgba('+aRgb+',.07);}.pb{display:inline-block;background:rgba('+aRgb+',.15);border:1px solid rgba('+aRgb+',.4);border-radius:20px;padding:3px 10px;font-size:13px;color:var(--go);font-weight:500;margin-top:6px;}.sp{display:none!important;}',
  };
  return b+(m[s]||m.classic);
}

function buildCardInner(style,sv,px,showDur,showPrice){
  function e(v){return String(v).replace(/</g,'&lt;')}
  var is='font-size:'+px+';';
  if(style==='pill')return '<div class="svc-pill"><span style="'+is+'">'+sv.icon+'</span><span style="font-size:12px;color:var(--tx)">'+e(sv.name)+'</span></div>'+(showDur?'<div class="sd">'+e(sv.dur)+'</div>':'')+(showPrice?'<div class="sp">'+e(sv.price)+'</div>':'');
  if(style==='circle')return '<div class="svc-circle"><span style="'+is+'">'+sv.icon+'</span></div><div class="sn">'+e(sv.name)+'</div>'+(showDur?'<div class="sd">'+e(sv.dur)+'</div>':'')+(showPrice?'<div class="sp">'+e(sv.price)+'</div>':'');
  if(style==='horizontal')return '<span style="'+is+'flex-shrink:0">'+sv.icon+'</span><div class="stc"><div class="sn">'+e(sv.name)+'</div>'+(showDur?'<div class="sd">'+e(sv.dur)+'</div>':'')+'</div>'+(showPrice?'<div class="sp" style="flex-shrink:0">'+e(sv.price)+'</div>':'');
  if(style==='topbar')return '<div class="card-inner"><div style="'+is+'margin-bottom:.5rem">'+sv.icon+'</div><div class="sn">'+e(sv.name)+'</div>'+(showDur?'<div class="sd">'+e(sv.dur)+'</div>':'')+(showPrice?'<div class="sp">'+e(sv.price)+'</div>':'')+'</div>';
  if(style==='pricetag')return '<div style="'+is+'margin-bottom:.5rem">'+sv.icon+'</div><div class="sn">'+e(sv.name)+'</div>'+(showDur?'<div class="sd">'+e(sv.dur)+'</div>':'')+(showPrice?'<div class="pb">'+e(sv.price)+'</div>':'');
  return '<div style="'+is+'margin-bottom:.5rem">'+sv.icon+'</div><div class="sn">'+e(sv.name)+'</div>'+(showDur?'<div class="sd">'+e(sv.dur)+'</div>':'')+(showPrice?'<div class="sp">'+e(sv.price)+'</div>':'');
}

function buildApp(cfg,services,profs,cardStyle,gridCols,iconSize,cardRadius,slots,blocked){
  var ac=cfg.accent,ar=hexToRgb(ac),a2=cfg.accent2||lighten(ac,30),bg=cfg.bg;
  var sf=addBr(bg,8),sf2=addBr(bg,14);
  var gc=gridCols===1?'1fr':gridCols===3?'1fr 1fr 1fr':'1fr 1fr';
  var px={sm:'18px',md:'26px',lg:'34px',xl:'44px'}[iconSize]||'26px';
  var cc=buildCardCSS(cardStyle,ar,bg,cardRadius);
  var showDur=cfg.showDur!==false,showPrice=cfg.showPrice!==false;
  var logo=cfg.logoDataUrl?'<img src="'+cfg.logoDataUrl+'" style="max-height:54px;max-width:180px;object-fit:contain;display:block;margin:0 auto .4rem">':'';
  function esc(v){return String(v).replace(/'/g,"\\'").replace(/</g,'&lt;')}
  var svcs=services.map(function(s,i){
    var badge=(i===0&&cfg.showBadge)?'<div style="position:absolute;top:8px;right:8px;background:rgba('+ar+',.2);border:1px solid rgba('+ar+',.5);border-radius:20px;padding:2px 8px;font-size:9px;color:var(--go)">Mais popular</div>':'';
    return '<div class="service-card" onclick="sel(this,\''+esc(s.name)+'\',\''+esc(s.dur)+'\',\''+esc(s.price)+'\')">'+badge+buildCardInner(cardStyle,s,px,showDur,showPrice)+'</div>';
  }).join('');
  var pcolors=['#c9a96e','#a97abc','#7aacbc','#7abc97','#bc7a7a'];
  var prHTML=profs.map(function(p,i){
    var col=pcolors[i%pcolors.length],ini=p.name.split(' ').map(function(w){return w[0]||''}).slice(0,2).join('');
    return '<div class="pc" onclick="selP(this,\''+esc(p.name)+'\')">'
      +'<div class="pa" style="background:'+col+'22;color:'+col+'">'+ini+'</div>'
      +'<div><div class="pn">'+p.name+'</div><div class="ps">'+p.spec+'</div><div class="pr">⭐ '+p.rating+'</div></div></div>';
  }).join('')
  +'<div class="pc" onclick="selP(this,\'Qualquer disponível\')">'
  +'<div class="pa" style="background:rgba(138,126,114,.12);color:#8a7e72">?</div>'
  +'<div><div class="pn">Qualquer disponível</div><div class="ps">Primeiro horário livre</div></div></div>';

  return `<style>
:root{--go:${ac};--go2:${a2};--tx:#f0ebe4;--mu:#8a7e72;--bo:rgba(${ar},.18);--bo2:rgba(${ar},.35);--sf:${sf};--sf2:${sf2};--rd:${cardRadius}px;}
body{background:${bg}!important}
body::before{content:'';position:fixed;top:-200px;right:-200px;width:500px;height:500px;background:radial-gradient(circle,rgba(${ar},.06) 0%,transparent 70%);pointer-events:none;z-index:0}
header{text-align:center;padding:2.5rem 1.25rem 1.5rem}
.ll{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:.4rem}
.ll::before{content:'';flex:1;max-width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--go))}
.ll::after{content:'';flex:1;max-width:60px;height:1px;background:linear-gradient(90deg,var(--go),transparent)}
.ln{font-family:'Cormorant Garamond',serif;font-size:clamp(1.5rem,5vw,2rem);font-weight:300;letter-spacing:.12em;color:var(--go2)}
.ls{font-size:10px;letter-spacing:.3em;color:var(--mu);text-transform:uppercase;margin-top:2px}
.steps{display:flex;justify-content:center;margin:0 auto 2rem;max-width:400px;padding:0 1.25rem;position:relative}
.sc{position:absolute;top:13px;left:50%;transform:translateX(-50%);width:58%;height:1px;background:var(--bo2);z-index:0}
.step{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;z-index:1}
.dot{width:26px;height:26px;border-radius:50%;border:1px solid var(--bo2);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--mu);background:${bg};transition:all .4s}
.dot.active{border-color:var(--go);color:var(--go);background:rgba(${ar},.08)}
.dot.done{border-color:var(--go);background:var(--go);color:${bg}}
.slb{font-size:9px;letter-spacing:.08em;color:var(--mu);text-transform:uppercase;text-align:center}
.slb.active{color:var(--go)}
.container{max-width:440px;margin:0 auto;padding:0 1.25rem 5rem}
.panel{display:none;animation:fi .3s ease}
.panel.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.st{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;font-style:italic;color:var(--go2);margin-bottom:.25rem}
.ss{font-size:11px;color:var(--mu);margin-bottom:1.25rem}
.sg{display:grid;grid-template-columns:${gc};gap:9px;margin-bottom:1.5rem}
.sn{font-size:13px;font-weight:400;color:var(--tx);margin-bottom:2px}
.sd{font-size:11px;color:var(--mu)}
.sp{font-size:14px;color:var(--go);font-weight:500;margin-top:5px}
${cc}
.pl{display:flex;flex-direction:column;gap:9px;margin-bottom:1.5rem}
.pc{border:1px solid var(--bo);border-radius:var(--rd);padding:.9rem 1rem;cursor:pointer;transition:all .25s;background:var(--sf);display:flex;align-items:center;gap:12px;-webkit-tap-highlight-color:transparent}
.pc:active{border-color:var(--bo2)}.pc.selected{border-color:var(--go);background:rgba(${ar},.07)}
.pa{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:16px;flex-shrink:0}
.pn{font-size:14px;font-weight:400;color:var(--tx)}.ps{font-size:11px;color:var(--mu);margin-top:1px}.pr{font-size:11px;color:var(--go);margin-top:2px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.cm{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:300;color:var(--go2)}
.cn{width:32px;height:32px;border:1px solid var(--bo2);border-radius:8px;background:none;color:var(--go);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:1.25rem}
.cdn{text-align:center;font-size:9px;color:var(--mu);padding:4px 0;text-transform:uppercase}
.cd{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;font-size:13px;cursor:pointer;transition:.2s;border:1px solid transparent;color:var(--mu);-webkit-tap-highlight-color:transparent;user-select:none}
.cd.av{color:var(--tx)}.cd.av:active{border-color:var(--bo2);background:var(--sf2)}
.cd.sel{background:var(--go);color:${bg};font-weight:500;border-color:var(--go)}
.cd.td{border-color:var(--bo2);color:var(--go)}.cd.em,.cd.pa{opacity:0;pointer-events:none}
.tg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.5rem}
.ts{border:1px solid var(--bo);border-radius:9px;padding:.65rem;text-align:center;font-size:13px;cursor:pointer;transition:.2s;color:var(--tx);background:var(--sf);-webkit-tap-highlight-color:transparent}
.ts:active{border-color:var(--bo2)}.ts.sel{border-color:var(--go);color:var(--go);background:rgba(${ar},.07)}
.ts.busy{opacity:.3;pointer-events:none;text-decoration:line-through}
.sum{border:1px solid var(--bo);border-radius:var(--rd);background:var(--sf);overflow:hidden;margin-bottom:1.5rem}
.sumh{background:rgba(${ar},.08);padding:.9rem 1.1rem;border-bottom:1px solid var(--bo)}
.sumh p{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--go2)}
.sumb{padding:1.1rem}
.sr{display:flex;justify-content:space-between;align-items:center;padding:.45rem 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.sr:last-child{border-bottom:none;padding-top:.65rem}
.sl{color:var(--mu)}.sv{color:var(--tx)}
.stot .sl{color:var(--tx);font-weight:500}.stot .sv{color:var(--go);font-size:15px;font-weight:500}
.fi{margin-bottom:.9rem}
.fi label{display:block;font-size:10px;letter-spacing:.1em;color:var(--mu);text-transform:uppercase;margin-bottom:.35rem}
.fi input{width:100%;background:var(--sf);border:1px solid var(--bo);border-radius:9px;padding:.72rem .9rem;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:.2s;-webkit-appearance:none}
.fi input:focus{border-color:var(--go2)}.fi input::placeholder{color:var(--mu)}
.btn{width:100%;padding:.82rem;border-radius:11px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:400;letter-spacing:.07em;cursor:pointer;transition:all .25s;margin-bottom:.65rem;-webkit-tap-highlight-color:transparent;border:none}
.bp{background:var(--go);color:${bg}}.bp:active{background:var(--go2)}.bp:disabled{opacity:.4;cursor:not-allowed}
.bg2{background:none;border:1px solid var(--bo)!important;color:var(--mu)}.bg2:active{border-color:var(--bo2)!important;color:var(--tx)}
.sw{text-align:center;padding:2.5rem .5rem}
.si{width:72px;height:72px;border-radius:50%;border:1px solid var(--go);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:28px;color:var(--go)}
.stt{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--go2);margin-bottom:.5rem}
.sub{font-size:12px;color:var(--mu);line-height:1.7;margin-bottom:2rem}
.cb{background:var(--sf);border:1px solid var(--bo2);border-radius:11px;padding:1rem;margin-bottom:1.5rem}
.cl{font-size:10px;letter-spacing:.2em;color:var(--mu);text-transform:uppercase;margin-bottom:4px}
.cv{font-family:'Cormorant Garamond',serif;font-size:2rem;letter-spacing:.2em;color:var(--go)}
</style>
<header>${logo}<div class="ll"><span class="ln">${cfg.bizname||'Agendamento'}</span></div><div class="ls">${cfg.tagline||''}</div></header>
<div class="steps" id="steps">
  <div class="step"><div class="dot active" id="dot1">1</div><div class="slb active" id="lbl1">Serviço</div></div>
  <div class="sc"></div>
  <div class="step"><div class="dot" id="dot2">2</div><div class="slb" id="lbl2">Profissional</div></div>
  <div class="step"><div class="dot" id="dot3">3</div><div class="slb" id="lbl3">Data</div></div>
  <div class="step"><div class="dot" id="dot4">4</div><div class="slb" id="lbl4">Confirmar</div></div>
</div>
<div class="container">
  <div class="panel active" id="step1"><div class="st">${cfg.t1||'Qual serviço?'}</div><div class="ss">Escolha o que deseja agendar</div><div class="sg">${svcs}</div><button class="btn bp" id="btn1" disabled onclick="go(2)">Continuar</button></div>
  <div class="panel" id="step2"><div class="st">${cfg.t2||'Profissional'}</div><div class="ss">Com quem prefere ser atendido(a)?</div><div class="pl">${prHTML}</div><button class="btn bp" id="btn2" disabled onclick="go(3)">Continuar</button><button class="btn bg2" onclick="go(1)">Voltar</button></div>
  <div class="panel" id="step3">
    <div class="st">Quando?</div><div class="ss">Escolha a data e horário</div>
    <div class="ch"><button class="cn" onclick="chM(-1)">‹</button><div class="cm" id="cal-month"></div><button class="cn" onclick="chM(1)">›</button></div>
    <div class="cg" id="cal-grid"></div>
    <div style="font-size:10px;letter-spacing:.1em;color:var(--mu);text-transform:uppercase;margin-bottom:.65rem" id="tt"></div>
    <div class="tg" id="tg"></div>
    <button class="btn bp" id="btn3" disabled onclick="go(4)">Continuar</button><button class="btn bg2" onclick="go(2)">Voltar</button>
  </div>
  <div class="panel" id="step4">
    <div class="st">Confirmar</div><div class="ss">Revise e informe seus dados</div>
    <div class="sum"><div class="sumh"><p>Resumo do agendamento</p></div><div class="sumb">
      <div class="sr"><span class="sl">Serviço</span><span class="sv" id="ss1">—</span></div>
      <div class="sr"><span class="sl">Profissional</span><span class="sv" id="ss2">—</span></div>
      <div class="sr"><span class="sl">Data</span><span class="sv" id="ss3">—</span></div>
      <div class="sr"><span class="sl">Horário</span><span class="sv" id="ss4">—</span></div>
      <div class="sr stot"><span class="sl">Total</span><span class="sv" id="ss5">—</span></div>
    </div></div>
    <div class="fi"><label>Nome completo</label><input type="text" id="fn" placeholder="Seu nome" oninput="vf()" autocomplete="name"></div>
    <div class="fi"><label>WhatsApp</label><input type="tel" id="fp" placeholder="(99) 99999-9999" oninput="vf()" autocomplete="tel"></div>
    <div class="fi"><label>E-mail (opcional)</label><input type="email" id="fe" placeholder="seu@email.com" autocomplete="email"></div>
    <button class="btn bp" id="btn4" disabled onclick="cb()">Confirmar agendamento</button>
    <button class="btn bg2" onclick="go(3)">Voltar</button>
  </div>
  <div class="panel" id="step5">
    <div class="sw"><div class="si">✓</div><div class="stt">Agendado!</div><div class="sub">${cfg.succ||'Seu horário foi confirmado!'}</div>
    <div class="cb2"><div class="cl">Código de confirmação</div><div class="cv" id="cc">#AG0000</div></div>
    <div class="sum"><div class="sumb">
      <div class="sr"><span class="sl">Serviço</span><span class="sv" id="cs1">—</span></div>
      <div class="sr"><span class="sl">Profissional</span><span class="sv" id="cs2">—</span></div>
      <div class="sr"><span class="sl">Data e hora</span><span class="sv" id="cs3">—</span></div>
      <div class="sr stot"><span class="sl">Total</span><span class="sv" id="cs4">—</span></div>
    </div></div>
    <button class="btn bg2" onclick="rs()" style="margin-top:1rem">Fazer novo agendamento</button></div>
  </div>
</div>
<script>
var bk={s:'',p:'',d:'',t:'',pr:''};var cd=new Date();cd.setDate(1);
var slots=${JSON.stringify(slots)};var blocked=${JSON.stringify(blocked)};var busy=[1,4,7];
function go(n){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  document.getElementById('step'+n).classList.add('active');
  for(var i=1;i<=4;i++){
    var d=document.getElementById('dot'+i),l=document.getElementById('lbl'+i);
    d.className='dot'+(i===n?' active':i<n?' done':'');
    l.className='slb'+(i===n?' active':'');
  }
  window.scrollTo({top:0,behavior:'smooth'});
  if(n===4){document.getElementById('ss1').textContent=bk.s;document.getElementById('ss2').textContent=bk.p;document.getElementById('ss3').textContent=bk.d;document.getElementById('ss4').textContent=bk.t;document.getElementById('ss5').textContent=bk.pr;}
}
function sel(el,name,dur,price){document.querySelectorAll('.service-card').forEach(function(c){c.classList.remove('selected')});el.classList.add('selected');bk.s=name;bk.pr=price;document.getElementById('btn1').disabled=false;}
function selP(el,name){document.querySelectorAll('.pc').forEach(function(c){c.classList.remove('selected')});el.classList.add('selected');bk.p=name;document.getElementById('btn2').disabled=false;}
var mn=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var dn=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
window.renderCal=function(){
  var m=cd.getMonth(),y=cd.getFullYear();
  document.getElementById('cal-month').textContent=mn[m]+' '+y;
  var g=document.getElementById('cal-grid');g.innerHTML='';
  dn.forEach(function(d){var e=document.createElement('div');e.className='cdn';e.textContent=d;g.appendChild(e);});
  var first=new Date(y,m,1).getDay(),total=new Date(y,m+1,0).getDate(),today=new Date();
  for(var i=0;i<first;i++){var e=document.createElement('div');e.className='cd em';g.appendChild(e);}
  for(var d=1;d<=total;d++){
    var e=document.createElement('div'),dt=new Date(y,m,d);
    var isPast=dt<new Date(today.getFullYear(),today.getMonth(),today.getDate());
    var isBlk=blocked.includes(dt.getDay());
    if(isPast||isBlk){e.className='cd pa';e.textContent=d;}
    else{
      e.className='cd av';
      if(d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear())e.classList.add('td');
      e.textContent=d;
      (function(day,el){el.onclick=function(){
        document.querySelectorAll('.cd').forEach(function(c){c.classList.remove('sel')});
        el.classList.add('sel');
        var mo=('0'+(m+1)).slice(-2),da=('0'+day).slice(-2);
        bk.d=da+'/'+mo+'/'+y;rt();
      };})(d,e);
    }
    g.appendChild(e);
  }
};
function chM(dir){cd.setMonth(cd.getMonth()+dir);bk.d='';bk.t='';document.getElementById('btn3').disabled=true;window.renderCal();document.getElementById('tg').innerHTML='';}
function rt(){
  var tg=document.getElementById('tg');tg.innerHTML='';
  document.getElementById('tt').textContent='Disponível em '+bk.d;
  slots.forEach(function(s,i){
    var e=document.createElement('div');e.className='ts'+(busy.includes(i)?' busy':'');e.textContent=s;
    if(!busy.includes(i)){e.onclick=function(){document.querySelectorAll('.ts').forEach(function(t){t.classList.remove('sel')});e.classList.add('sel');bk.t=s;document.getElementById('btn3').disabled=false;};}
    tg.appendChild(e);
  });
}
function vf(){var n=document.getElementById('fn').value.trim(),p=document.getElementById('fp').value.trim();document.getElementById('btn4').disabled=!(n.length>2&&p.length>7);}
function cb(){
  var code='#AG'+Math.floor(1000+Math.random()*9000);
  document.getElementById('cc').textContent=code;
  document.getElementById('cs1').textContent=bk.s;document.getElementById('cs2').textContent=bk.p;
  document.getElementById('cs3').textContent=bk.d+' às '+bk.t;document.getElementById('cs4').textContent=bk.pr;
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active')});
  document.getElementById('step5').classList.add('active');
  document.getElementById('steps').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}
function rs(){
  bk={s:'',p:'',d:'',t:'',pr:''};document.getElementById('steps').style.display='flex';
  document.querySelectorAll('.service-card,.pc,.cd,.ts').forEach(function(e){e.classList.remove('selected','sel')});
  ['btn1','btn2','btn3'].forEach(function(id){document.getElementById(id).disabled=true;});
  document.getElementById('fn').value='';document.getElementById('fp').value='';document.getElementById('fe').value='';
  go(1);window.renderCal();
}
window.renderCal();
<\/script>`;
}
</script>
</body>
</html>
